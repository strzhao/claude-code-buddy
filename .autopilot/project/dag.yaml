  - id: SC-03
    name: 直接对话模式（Markdown 流式渲染）
  - id: SC-04
    name: CLI 插件安装与首次执行 TOFU 弹框
  - id: SC-05
    name: TOFU 允许后插件执行返回 Markdown
  - id: SC-06
    name: TOFU 拒绝后插件不执行
  - id: SC-07
    name: 未配置 provider 时发起对话显示引导错误
  - id: SC-08
    name: 每次唤起为独立新 Session
  - id: SC-09
    name: buddy launcher remove 卸载插件
  - id: SC-10
    name: Launcher 与像素猫完全互不干扰
  - id: SC-11
    name: buddy launcher inspect 查看插件详情
  - id: SC-12
    name: 本地 Ollama 配置与失联错误
