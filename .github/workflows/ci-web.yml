name: CI Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/ci-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/ci-web.yml'

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @stringzhao/web lint

      - name: Type check
        run: pnpm --filter @stringzhao/web exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter @stringzhao/web test

      - name: Acceptance tests
        run: pnpm --filter @stringzhao/web test:acceptance

      - name: Build
        run: pnpm --filter @stringzhao/web build

      - name: Bundle size check
        run: pnpm --filter @stringzhao/web size

      - name: Lighthouse CI (Core Web Vitals gate)
        # 复用上一步 Build 产物；lighthouserc 的 startServerCommand 起 next start:3000，
        # autorun 采集 / 与 /upload 后按 'error' 断言性能预算，超预算即 fail 此步。
        # 已验证 CI 环境下性能预算达标（commit dda7045 实跑通过）；
        # 若偶发 categories:performance 综合分误报，可在 lighthouserc 把它单独改 'warn'。
        run: pnpm --filter @stringzhao/web exec lhci autorun

      - name: Security audit
        run: pnpm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @stringzhao/web exec playwright install --with-deps chromium

      - name: Build
        run: pnpm --filter @stringzhao/web build

      - name: Run E2E tests
        run: pnpm --filter @stringzhao/web test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30
