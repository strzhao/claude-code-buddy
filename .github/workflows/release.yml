name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # release: 单 macos-14 runner 上交叉编译 arm64 + x86_64，lipo 合并 universal。
  #
  # 为什么不用 macos-13 native x86_64：
  #   GitHub Actions 已停用 macos-13 runner（2025 年中起无分配），
  #   x86_64 只能通过 macos-14 上 --arch x86_64 交叉编译。
  #
  # 为什么 bundle 放在 Contents/Resources/ 而非 .app/ 根目录：
  #   codesign 拒绝 .app/ 根目录有非标准内容（"unsealed contents present
  #   in the bundle root"），SPM resource bundle 必须放在标准位置。
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Build + Release (universal)
    runs-on: macos-14

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version
        working-directory: apps/desktop

      - name: Fetch official plugins
        # C1：在 swift build 之前从官方插件 monorepo 拉取 plugins/ 源打进 bundle。
        # fetch 失败令 CI 失败（非静默）—— release 不带插件等于发布残缺 app。
        # Makefile fetch-plugins target 调用 Scripts/fetch-plugins.sh（含缓存兜底）。
        run: make -C apps/desktop fetch-plugins

      - name: Build arm64 (native)
        run: swift build -c release --arch arm64
        working-directory: apps/desktop

      - name: Build x86_64 (cross-compile)
        run: swift build -c release --arch x86_64
        working-directory: apps/desktop

      - name: Create universal binaries (lipo 合并两 arch)
        run: |
          lipo -create -output ClaudeCodeBuddy \
            .build/arm64-apple-macosx/release/ClaudeCodeBuddy \
            .build/x86_64-apple-macosx/release/ClaudeCodeBuddy
          lipo -create -output buddy \
            .build/arm64-apple-macosx/release/buddy-cli \
            .build/x86_64-apple-macosx/release/buddy-cli
        working-directory: apps/desktop

      - name: Assemble .app bundle
        run: |
          APP="ClaudeCodeBuddy.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp ClaudeCodeBuddy "$APP/Contents/MacOS/ClaudeCodeBuddy"
          chmod +x "$APP/Contents/MacOS/ClaudeCodeBuddy"

          cp buddy "$APP/Contents/MacOS/buddy"
          chmod +x "$APP/Contents/MacOS/buddy"

          cp Sources/ClaudeCodeBuddy/Resources/Info.plist "$APP/Contents/Info.plist"

          # Copy app icon
          cp Sources/ClaudeCodeBuddy/Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"

          # Copy SPM resource bundles 到 Contents/Resources/
          # 两 arch bundle 内容完全相同（仅本地化 .strings），用 arm64 的即可
          cp -R .build/arm64-apple-macosx/release/ClaudeCodeBuddy_BuddyCore.bundle "$APP/Contents/Resources/"
          cp -R .build/arm64-apple-macosx/release/KeyboardShortcuts_KeyboardShortcuts.bundle "$APP/Contents/Resources/"

          # Update version in Info.plist
          TAG="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $TAG" "$APP/Contents/Info.plist"
        working-directory: apps/desktop

      - name: Verify bundle integrity
        run: |
          APP="ClaudeCodeBuddy.app"
          echo "Checking bundle integrity..."
          for f in \
            "$APP/Contents/MacOS/ClaudeCodeBuddy" \
            "$APP/Contents/MacOS/buddy" \
            "$APP/Contents/Info.plist" \
            "$APP/Contents/Resources/AppIcon.icns" \
            "$APP/Contents/Resources/ClaudeCodeBuddy_BuddyCore.bundle" \
            "$APP/Contents/Resources/KeyboardShortcuts_KeyboardShortcuts.bundle"; do
            if [ ! -e "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "  OK: $f"
          done

          # Quick smoke: verify universal binary has both archs
          echo "Verifying universal binary..."
          ARCHS=$(lipo -info "$APP/Contents/MacOS/ClaudeCodeBuddy" 2>/dev/null || true)
          echo "  $ARCHS"
          if ! echo "$ARCHS" | grep -q "arm64.*x86_64\|x86_64.*arm64"; then
            echo "ERROR: not a universal binary"
            exit 1
          fi
          echo "Bundle integrity check passed."
        working-directory: apps/desktop

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - ClaudeCodeBuddy.app
        working-directory: apps/desktop

      - name: Zip .app bundle
        run: zip -r "ClaudeCodeBuddy-${{ github.ref_name }}.zip" ClaudeCodeBuddy.app
        working-directory: apps/desktop

      - name: Move release zip to repo root
        run: mv apps/desktop/ClaudeCodeBuddy-*.zip ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Code Buddy ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ClaudeCodeBuddy-${{ github.ref_name }}.zip
          body: |
            ## Claude Code Buddy ${{ github.ref_name }}

            Dock 上方的像素猫咪，实时反映 Claude Code 工作状态。

            ### 安装步骤

            **1. 下载 App**

            Homebrew（推荐）：
            ```
            brew tap strzhao/claude-code-buddy
            brew install claude-code-buddy
            ```

            或手动安装：
            1. 下载下方的 `ClaudeCodeBuddy-${{ github.ref_name }}.zip`
            2. 解压，将 `ClaudeCodeBuddy.app` 拖入 `Applications` 文件夹
            3. 首次打开时，右键选择「打开」绕过 Gatekeeper 提示

            **2. 安装 Hooks 插件**
            在 Claude Code 中运行：
            ```
            /plugin marketplace add strzhao/claude-code-buddy
            /plugin install claude-code-buddy-hooks
            /reload-plugins
            ```

            **3. 启动 App，然后正常使用 Claude Code**
            猫咪会自动出现在 Dock 上方。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Download release zip and compute sha256
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ZIP_URL="https://github.com/strzhao/claude-code-buddy/releases/download/${TAG}/ClaudeCodeBuddy-${TAG}.zip"

          curl -fSL -o release.zip "$ZIP_URL"
          SHA256=$(sha256sum release.zip | awk '{print $1}')

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Update Cask formula
        run: |
          sed -i "s/version \".*\"/version \"$VERSION\"/" homebrew/Casks/claude-code-buddy.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" homebrew/Casks/claude-code-buddy.rb

      - name: Push to tap repo
        run: |
          TAP_REPO="https://x-access-token:${TAP_TOKEN}@github.com/strzhao/homebrew-claude-code-buddy.git"
          git clone "$TAP_REPO" tap-repo
          mkdir -p tap-repo/Casks
          cp homebrew/Casks/claude-code-buddy.rb tap-repo/Casks/
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/claude-code-buddy.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update claude-code-buddy to v${VERSION}"
          git push
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Sync cask file back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add homebrew/Casks/claude-code-buddy.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(cask): 同步版本号到 v${VERSION}"
          git push origin main
